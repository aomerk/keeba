name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: build
        run: go build ./...

      - name: test
        run: go test ./... -race -count=1

      - name: lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.4.0

      - name: dogfood
        run: ./dogfood.sh
