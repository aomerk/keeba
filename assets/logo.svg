<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 280" role="img" aria-labelledby="title desc">
  <title id="title">keeba horizontal logo lockup</title>
  <desc id="desc">A futuristic horizontal logo for keeba: codebase pixels compress through a bridge into AI context, with a cyan-to-violet gradient icon and clean wordmark.</desc>
  <defs>
    <linearGradient id="keebaGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="48%" stop-color="#38B2F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#DDE7F3"/>
    </linearGradient>
    <filter id="softGlow" x="-35%" y="-45%" width="170%" height="190%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.13  0 0 0 0 0.70  0 0 0 0 1.00  0 0 0 0.75 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="wordGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1120" height="280" rx="0" fill="#070B12"/>

  <!-- Subtle background grid -->
  <g opacity="0.16" stroke="#263244" stroke-width="1">
    <path d="M40 48H1080M40 232H1080"/>
    <path d="M96 28V252M1024 28V252"/>
  </g>

  <!-- Icon: raw codebase bytes -> structured bridge -> AI-ready context -->
  <g transform="translate(86 47)" filter="url(#softGlow)">
    <!-- left fragmented byte field -->
    <g>
      <rect x="0" y="38" width="13" height="13" rx="2" fill="#E5E7EB" opacity="0.58"/>
      <rect x="38" y="30" width="10" height="10" rx="2" fill="#38B2F6" opacity="0.95"/>
      <rect x="74" y="43" width="9" height="9" rx="2" fill="#22D3EE" opacity="0.86"/>
      <rect x="104" y="57" width="8" height="8" rx="2" fill="#22D3EE" opacity="0.78"/>

      <rect x="20" y="72" width="10" height="10" rx="2" fill="#94A3B8" opacity="0.72"/>
      <rect x="54" y="70" width="11" height="11" rx="2" fill="#3B82F6" opacity="0.86"/>
      <rect x="88" y="75" width="10" height="10" rx="2" fill="#22D3EE" opacity="0.78"/>
      <rect x="119" y="79" width="8" height="8" rx="2" fill="#38B2F6" opacity="0.70"/>

      <rect x="-8" y="106" width="18" height="13" rx="2" fill="#CBD5E1" opacity="0.72"/>
      <rect x="34" y="104" width="13" height="13" rx="2" fill="#64748B" opacity="0.80"/>
      <rect x="72" y="107" width="11" height="11" rx="2" fill="#38B2F6" opacity="0.92"/>
      <rect x="107" y="111" width="9" height="9" rx="2" fill="#22D3EE" opacity="0.74"/>

      <rect x="14" y="140" width="12" height="12" rx="2" fill="#475569" opacity="0.72"/>
      <rect x="52" y="143" width="10" height="10" rx="2" fill="#94A3B8" opacity="0.76"/>
      <rect x="90" y="145" width="9" height="9" rx="2" fill="#3B82F6" opacity="0.86"/>
      <rect x="124" y="147" width="7" height="7" rx="2" fill="#22D3EE" opacity="0.78"/>
    </g>

    <!-- left funnel bracket -->
    <path d="M160 22 L214 54 L214 132 L160 164" fill="none" stroke="url(#keebaGradient)" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- bridge body -->
    <path d="M214 64 C262 84 324 84 372 64" fill="none" stroke="url(#keebaGradient)" stroke-width="17" stroke-linecap="round"/>
    <path d="M214 122 C262 102 324 102 372 122" fill="none" stroke="url(#keebaGradient)" stroke-width="17" stroke-linecap="round"/>
    <!-- right AI bracket -->
    <path d="M426 22 L372 54 L372 132 L426 164" fill="none" stroke="url(#keebaGradient)" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- tiny flow streaks -->
    <path d="M232 93H354" stroke="#C4B5FD" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
    <path d="M250 77H336" stroke="#22D3EE" stroke-width="2" opacity="0.28" stroke-linecap="round"/>
    <path d="M248 110H338" stroke="#8B5CF6" stroke-width="2" opacity="0.25" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(570 0)" filter="url(#wordGlow)">
    <text x="0" y="151" fill="url(#textGradient)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="104" font-weight="650" letter-spacing="-4">keeba</text>
    <text x="4" y="198" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="450" letter-spacing="6">codebase</text>
    <text x="190" y="198" fill="#22D3EE" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="600">→</text>
    <text x="238" y="198" fill="#8B5CF6" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="500" letter-spacing="6">AI</text>
  </g>
</svg>
